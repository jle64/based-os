---
name: based-os
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/silverblue-nvidia
image-version: 44

modules:
  - type: dnf
    repos:
      files:
        - https://raw.githubusercontent.com/terrapkg/subatomic-repos/main/terra.repo
    install:
      packages:
        - brightnessctl
        - fish
        - git-credential-libsecret
        - kdeconnectd
        - kitty
        - mangowm
        - niri
        - nix
        - noctalia-shell
        - playerctl
        - tailscale
      exclude:
        - alacritty
        - waybar
        - swaylock
    remove:
      packages:
        - firefox
        - firefox-langpacks
  - type: signing
