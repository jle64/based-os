---
name: based-os
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /
  - type: dnf
    repos:
      #nonfree: negativo17
      files:
        - https://raw.githubusercontent.com/terrapkg/subatomic-repos/main/terra.repo
      copr:
        - wezfurlong/wezterm-nightly
        - avengemedia/danklinux
    install:
      packages:
        - brightnessctl
        - DankMaterialShell
        - danksearch
        - dgop
        - dms-greeter
        - fish
        - kdeconnectd
        - kitty
        - nix
        - niri
        - noctalia-shell
        - playerctl
        - tailscale
        - wezterm
      exclude:
        - alacritty
        - waybar
        - swaylock
    remove:
      packages:
        - firefox
        - firefox-langpacks
  - type: soar
    additional-repos: true
    auto-upgrade: true
    upgrade-interval: '24h'
  - type: signing
